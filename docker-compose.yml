services:

  # FastAPI Application 
  app:
    build: .
    container_name: marketlens_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Hot reload — maps local app folder to container
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # PostgreSQL Database 
  db:
    image: postgres:15-alpine
    container_name: marketlens_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Persistent storage — data survives container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache 
  redis:
    image: redis:7-alpine
    container_name: marketlens_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Streamlit Dashboard 
  dashboard:
    build: .
    container_name: marketlens_dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      - app
    command: streamlit run app/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

# Named Volumes
volumes:
  postgres_data:
  redis_data: